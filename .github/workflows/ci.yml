name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  test:
    name: Node.js 20 tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run tests
        run: npm test

      - name: Validate harness template
        run: npm run validate:template
